    <script>
      (function() {
        if (typeof window !== 'undefined') {
          // Define 'global' and 'globalThis' as Proxies to window to catch attempts to overwrite read-only properties like 'fetch'
          var proxyHandler = {
            get: function(t, p) {
              if (p === 'global' || p === 'globalThis') return window.global;
              var v = t[p];
              // Bind native functions to window to avoid "Illegal invocation"
              if (typeof v === 'function' && v.toString().includes('[native code]')) {
                return v.bind(t);
              }
              return v;
            },
            set: function(t, p, v) {
              // Absorb attempts to overwrite read-onlys via global.fetch or globalThis.fetch
              if (p === 'fetch') return true;
              try {
                // Check if the property is writable on the actual window object
                var descriptor = Object.getOwnPropertyDescriptor(t, p);
                if (descriptor && !descriptor.writable && !descriptor.set) {
                  return true; // Silent success
                }
                t[p] = v;
              } catch(e) {}
              return true;
            }
          };

          try {
            window.global = new Proxy(window, proxyHandler);
            if (!window.globalThis) {
              window.globalThis = window.global;
            }
          } catch (e) {
            window.global = window;
          }
        }
      })();
