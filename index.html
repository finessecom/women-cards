      (function() {
        if (typeof window !== 'undefined') {
          // Polyfill 'global' and 'globalThis'
          window.global = window;
          if (!window.globalThis) {
            window.globalThis = window;
          }

          // Some libraries try to polyfill fetch and crash if it's read-only
          try {
            var _realFetch = window.fetch;
            var _currentFetch = _realFetch;
            
            // Define a proxy for global objects to intercept fetch assignment
            var proxyHandler = {
              get: function(target, prop) {
                if (prop === 'fetch') return _currentFetch;
                var value = target[prop];
                if (typeof value === 'function') return value.bind(target);
                return value;
              },
              set: function(target, prop, value) {
                if (prop === 'fetch') {
                  _currentFetch = value;
                  return true;
                }
                try {
                  target[prop] = value;
                } catch (e) {
                  // Ignore read-only errors on global
                }
                return true;
              }
            };

            window.global = new Proxy(window, proxyHandler);
            window.globalThis = window.global;

            // Also try to redefine on window itself to catch direct window.fetch = ...
            Object.defineProperty(window, 'fetch', {
              get: function() { return _currentFetch; },
              set: function(v) { _currentFetch = v; },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn("Could not fully polyfill fetch setter, some libraries might crash", e);
          }
